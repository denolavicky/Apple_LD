<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple (Nigeria)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header></header>

    <main>
      <!-- iPhone Air Hero -->
      <section class="home-hero home-hero--light" aria-labelledby="hero-air-heading">
        <div class="home-hero__inner">
          <h2 class="home-hero__headline" id="hero-air-heading">
            iPhone Air
          </h2>

          <p class="home-hero__subhead">
            The thinnest iPhone ever.<br />With the power of pro inside.
          </p>

          <div class="home-hero__ctas">
            <a href="iphone-air.html" class="home-hero__link">Learn more</a>
          </div>

          <figure class="home-hero__image-wrap">
            <img
              class="home-hero__image"
              src="Assets/Images/asset 20.jpeg"
              alt="iPhone Air"
            />
          </figure>
        </div>
      </section>

      <!-- iPhone 17 Hero -->
      <section class="home-hero home-hero--white">
        <div class="home-hero__inner">
          <h2 class="home-hero__headline">iPhone 17</h2>
          <p class="home-hero__subhead">Magichromatic.</p>

          <div class="home-hero__ctas">
            <a href="#" class="home-hero__btn">Learn more</a>
          </div>
        </div>

        <figure class="home-hero__image-wrap home-hero__image-wrap--full">
          <img
            class="home-hero__image"
            src="Assets/Images/asset 21.jpeg"
            alt="iPhone 17"
          />
        </figure>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
